{% extends 'base.html' %}

{% block content %}
<h2 class="text-success mb-4">{{ titre_page }}</h2>

<div class="list-group list-group-flush">
    {% for actu in actus %}
    <div class="list-group-item py-4 border-bottom">
        <div class="d-flex w-100 justify-content-between align-items-center">
            <h3 class="mb-1 fw-bold">{{ actu.titre }}</h3>
            <span class="badge bg-success rounded-pill px-3">{{ actu.categorie.nom }}</span>
        </div>
        <p class="text-muted small">Publié le {{ actu.date_pub.strftime('%d/%m/%Y à %H:%M') }}</p>
        <p class="fs-5 mt-3">{{ actu.contenu }}</p>
    </div>
    {% else %}
        <div class="alert alert-light border">Aucun article trouvé dans cette catégorie.</div>
    {% endfor %}
</div>
{% endblock %}
